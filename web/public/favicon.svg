  <g fill="#1c1915">
    <rect x="118" y="222" width="12" height="9"/><rect x="138" y="222" width="12" height="9"/><rect x="158" y="222" width="12" height="9"/><rect x="178" y="222" width="12" height="9"/><rect x="198" y="222" width="12" height="9"/><rect x="218" y="222" width="12" height="9"/><rect x="238" y="222" width="12" height="9"/><rect x="258" y="222" width="12" height="9"/><rect x="278" y="222" width="12" height="9"/><rect x="298" y="222" width="12" height="9"/><rect x="318" y="222" width="12" height="9"/><rect x="338" y="222" width="12" height="9"/><rect x="358" y="222" width="12" height="9"/><rect x="378" y="222" width="12" height="9"/>
    <rect x="118" y="290" width="12" height="9"/><rect x="138" y="290" width="12" height="9"/><rect x="158" y="290" width="12" height="9"/><rect x="178" y="290" width="12" height="9"/><rect x="198" y="290" width="12" height="9"/><rect x="218" y="290" width="12" height="9"/><rect x="238" y="290" width="12" height="9"/><rect x="258" y="290" width="12" height="9"/><rect x="278" y="290" width="12" height="9"/><rect x="298" y="290" width="12" height="9"/><rect x="318" y="290" width="12" height="9"/><rect x="338" y="290" width="12" height="9"/><rect x="358" y="290" width="12" height="9"/><rect x="378" y="290" width="12" height="9"/>
