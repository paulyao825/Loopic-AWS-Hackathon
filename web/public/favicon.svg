<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Precious Frame 雕版勳章圖示">
  <rect width="512" height="512" fill="#f3eddf"/>
  <defs>
    <path id="c-star" d="M0 -9 L2.5 -2.5 L9 0 L2.5 2.5 L0 9 L-2.5 2.5 L-9 0 L-2.5 -2.5 Z"/>
  </defs>

  <!-- 紅環勳章（無字） -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#8f2016" stroke-width="2"/>
  <circle cx="256" cy="256" r="214" fill="none" stroke="#b72c1d" stroke-width="36"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="#8f2016" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="192" fill="none" stroke="#8f2016" stroke-width="1.5"/>

  <!-- 環帶裝飾點與星 -->
  <g fill="#f3eddf">
    <circle cx="256" cy="42" r="4"/>
    <circle cx="256" cy="470" r="4"/>
    <use href="#c-star" x="48" y="256"/>
    <use href="#c-star" x="464" y="256"/>
    <circle cx="100" cy="100" r="3"/>
    <circle cx="412" cy="100" r="3"/>
    <circle cx="100" cy="412" r="3"/>
    <circle cx="412" cy="412" r="3"/>
  </g>

